<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>
    <h3> 입력 마크업 </h3>
    <form> <!-- 여러개 입력 마크업들을 그룹 해주는 역할, 추후에 백엔드 통신-->
        텍스트: <input type="text" value="허허" disabled /> <br />
        텍스트2: <input type="text" placeholder="저기요" readonly /> <br />
        비밀번호: <input type ="password" /> <br />
        첨부파일: <input type="file" /> <br />
        숫자: <input type="number" />  <br />
        날짜: <input type="date" />  <br />
        시간: <input type="time" />  <br />
        날짜/시간: <input type="datetime-local" /> <br />
        스크롤: <input type="range" />  <br />
        체크박스 원(단일): <input type="radio" name="동의여부" /> 예 
                         <input type="radio" name="동의여부" /> 아니오 <br />
        체크박스 네모(복수): <input type="checkbox" name="가입" > 아니오 
                           <input type="checkbox" name="가입" > 뭘<br />
        전송버튼: <input type="submit" value="전송튼"  />  <br />
        리셋버튼: <input type="reset" value="초기" /> <br />
        일반버튼: <input type="button" value="알림" onclick="" /> <br />
        일반버튼2: <button type="button"> 아주 큰 버튼</button> <br />
        긴텍스트: <textarea col="50" row="30" > </textarea> <br />
        목록상자: <select>
                    <option> 라면 </option>
                    <option> 콜라먹고싶다 </option> 
                </select>

    </form>
    
</body>
</html>
