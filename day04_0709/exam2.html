<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
<body>
    <h3> 테이블/표 마크업 </h3>
    <table border="1"> <!-- 테이블 전체를 감싼 마크업 -->
        <thead> <!-- 테이블의 제목 구역 -->
            <tr> <!-- 테이블의 행 추가 -->
                <th> <!-- 테이블의 제목-->
                    제목

                </th>
                <th>
                    제제목
                </th>

            </tr>
        </thead>
        <tbody> <!-- 테이블의 본문 구역 -->
            <tr>
                <td> <!-- 테이블의 데이터 -->
                    데이터1
                </td>
                <td rowspan="2"> 데이터2 </td> <!-- 행 병합-->
            </tr>
            <tr>
                <td> 데이터4 </td>
            </tr>
            <tr> <!-- 두번째 행 추가-->
                <td colspan="2"> 데이터 3 </td> <!-- colspan="열 병합"-->
            </tr>
        </tbody>
        <tfoot> <!-- 테이블의 하단 구역-->

        </tfoot>
        
    </table>

    
</body>
</html>
