<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <title>Page Title</title>

    <!-- CSS 방법 3 -->
    <link href='exam1.css' rel="styleSheet" /> <!-- css 파일을 불러오는 코드-->
    
    <!-- CSS 방법 2 -->
    <style>
        h4{ color: red; }
    </style>

</head>
<body>

    <!-- 
        HTML:이동 가능한 텍스트 마크업 언어                            EX] 뼈대
        CSS: Cascading(위에서 아래로 흐름) Style(꾸미기) Sheet(덮는)   EX] 옷
            -> 위에서 아래로 (HTML) 꾸미기 시트를 덮는다.  EX] 동적(이벤트)
        JS: 자바스크립트 프로그래밍 언어
    -->                              
    
    <!-- CSS를 적용하는 방법 1 : 인라인 (마크업 내 style 속성 이용)-->
    <h3 style="color: blue;"> 저리가라 </h3> <!-- h3 마크업 ; 꼮 넣어줘야함 -->
    
    <!-- CSS 적용하는 방법 2 : <head> 마크업 내 <style> 마크업 문법-->
    <h4> HTML head에 </h4>
    
    <!-- CSS를 적용하는 방법 3 : .css 파일내 css문법 작성 <head> 마크업에서 호출-->
    <h5> 파일로 적용 </h5>
    <h6> css 선택자 * </h6>
    <h6 class="구역1"> css 선택순위</h6>
    <h6 id="구역2"> 여기다 </h6>

    <!-- 주의할점: 하위요소 마크업 작성시 tab 탭 -->
    <div> <!-- 상위요소 body, 하위요소: h3,ol -->
        <h3> 학생 명단</h3> <!-- 상위요소 div, 하위요소 x-->
        <ol> <!-- 상위요소 div, 하위 요소 li-->
            <li id="이름1"> 유재석 </li> <!-- 상위요소 ol, 하위요소 x -->
            <li> 강호동 </li>
        </ol>
    </div>

    <h2> CSS 텍스트 주요 속성 </h2>
    <h1 class="title"> 강아지 </h1>
    <div class="본문구역">
        으로 삼은 동물로 알려져 있으며, 역사적으로 반려견, 사냥견으로서 길들였을걸 알고 있윽
        거다. 그런가 아닌가
    </div>
    <p class="작성자"> 구글엔진 </p>

</body>
</html>
