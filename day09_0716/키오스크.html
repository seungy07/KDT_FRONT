<!DOCTYPE html>
<html lang='en'>
<head>
    <link rel='stylesheet' href='키오스크.css'>
</head>
<body class="전체flex">
    <div class="head">
        <img class="마크" src="메머드마크(핑크).png" />
    </div> <br />

    <div class="주문상단">
        <img src="콜드브루.png">

        <div class="가격영역">
            <div class="금액">
                <label>상품금액</label>
                <input type="text">
            </div>

            <span class="기호">+</span>

            <div class="금액">
                <label>옵션금액</label>
                <input type="text">
            </div>

            <span class="기호">=</span>

            <div class="금액">
                <label>주문금액</label>
                <input type="text">
            </div>
        </div>
    </div> <br />
    
    <div> HOT / ICE </div>
    <div class="온도">
        <input type="radio" name="온도"> <img src="hot이미지.png" />
        <input type="radio" name="온도"> <img src="ice이미지.png" />
    </div> <br />
    
    <div> SIZE </div>
    <div class="size">
        <input type="radio" name="size"> <img src="스몰사이즈.png" />
        <input type="radio" name="size"> <img src="미듐.png" />
        <input type="radio" name="size"> <img src="라지사이즈.png" />

    </div> <br />
    
    <div class="주문금액상단">
        <div class="주문금액하단">
            주문금액
            <div class="수량">
                <span class="버튼"> - </span>
                <span class="개수"> 1 </span>
                <span class="버튼"> + </span>
            </div>
        </div>

    </div>

    
</body>
</html>
